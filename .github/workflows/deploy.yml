name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: "API key for web access (leave empty for a random key)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Get Cloudflare account ID
        id: account
        run: |
          npx wrangler whoami > whoami.txt
          ACCOUNT_ID=$(grep -oE '[0-9a-f]{32}' whoami.txt | head -1)
          if [ -z "$ACCOUNT_ID" ]; then
            echo "Could not determine Cloudflare account ID"
            exit 1
          fi
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "Account ID: $ACCOUNT_ID"

      - name: Create R2 bucket
        run: npx wrangler r2 bucket create r2-storage || true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}

      - name: Set R2 CORS
        run: npx wrangler r2 bucket cors set r2-storage --file scripts/r2-cors.json
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}

      - name: Create or find D1 database
        id: database
        run: |
          npx wrangler d1 list > d1-list.txt
          DATABASE_ID=$(grep 'r2-storage' d1-list.txt | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')

          if [ -z "$DATABASE_ID" ]; then
            npx wrangler d1 create r2-storage > d1-create.txt 2>&1 || true
            DATABASE_ID=$(grep -oE 'database_id = "([^"]+)"' d1-create.txt | sed -E 's/database_id = "([^"]+)"/\1/')
          fi

          if [ -z "$DATABASE_ID" ]; then
            npx wrangler d1 list > d1-list.txt
            DATABASE_ID=$(grep 'r2-storage' d1-list.txt | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
          fi

          if [ -z "$DATABASE_ID" ]; then
            echo "Failed to create or find D1 database 'r2-storage'"
            exit 1
          fi

          echo "database_id=$DATABASE_ID" >> "$GITHUB_OUTPUT"
          echo "Database ID: $DATABASE_ID"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}

      - name: Update wrangler.toml
        run: |
          ACCOUNT_ID="${{ steps.account.outputs.account_id }}"
          DATABASE_ID="${{ steps.database.outputs.database_id }}"
          sed -i "s/^account_id = \".*\"/account_id = \"$ACCOUNT_ID\"/" wrangler.toml
          sed -i "s/^database_id = \".*\"/database_id = \"$DATABASE_ID\"/" wrangler.toml
          sed -i "s/^R2_ACCOUNT_ID = \".*\"/R2_ACCOUNT_ID = \"$ACCOUNT_ID\"/" wrangler.toml

      - name: Initialize D1 schema
        run: npx wrangler d1 execute r2-storage --remote --file=schema.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}

      - name: Prepare API key
        id: apikey
        run: |
          API_KEY="${{ github.event.inputs.api_key }}"
          if [ -z "$API_KEY" ]; then
            API_KEY=$(node -e "console.log(Array.from(crypto.getRandomValues(new Uint8Array(24))).map(b => b.toString(36).padStart(2, '0')).join('').slice(0, 32))")
          fi
          echo "api_key=$API_KEY" >> "$GITHUB_OUTPUT"

      - name: Set Worker secrets
        run: |
          printf '%s' "${{ secrets.R2_ACCESS_KEY_ID }}" | npx wrangler secret put R2_ACCESS_KEY_ID
          printf '%s' "${{ secrets.R2_SECRET_ACCESS_KEY }}" | npx wrangler secret put R2_SECRET_ACCESS_KEY
          printf '%s' "${{ steps.apikey.outputs.api_key }}" | npx wrangler secret put API_KEY
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}

      - name: Print API key
        run: |
          echo ""
          echo "========================================"
          echo "Deployment complete!"
          echo "Your API key for login: ${{ steps.apikey.outputs.api_key }}"
          echo "Save it somewhere safe."
          echo "========================================"
